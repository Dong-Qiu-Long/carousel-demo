<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>无缝轮播图Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      border: 1px solid red;
    }

    .carousel {
      width: 100%;
      max-width: 800px;
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .carousel-track {
      display: flex;
    }

    .carousel-slide {
      min-width: 100%;
      height: 450px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .carousel-slide:nth-child(1) {
      background: linear-gradient(45deg, #74b9ff, #0984e3);
    }

    .carousel-slide:nth-child(2) {
      background: linear-gradient(45deg, #ff6b6b, #feca57);
    }

    .carousel-slide:nth-child(3) {
      background: linear-gradient(45deg, #48dbfb, #1dd1a1);
    }

    .carousel-slide:nth-child(4) {
      background: linear-gradient(45deg, #a55eea, #26de81);
    }

    .carousel-slide:nth-child(5) {
      background: linear-gradient(45deg, #fd79a8, #fdcb6e);
    }

    .carousel-slide:nth-child(6) {
      background: linear-gradient(45deg, #74b9ff, #0984e3);
    }

    .carousel-slide:nth-child(7) {
      background: linear-gradient(45deg, #ff6b6b, #feca57);
    }

    .slide-content {
      text-align: center;
      color: white;
    }

    .slide-content h2 {
      font-size: 3rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .slide-content p {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.3);
      border: none;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 24px;
      color: white;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
      z-index: 10;
    }

    .carousel-btn:hover {
      background: rgba(255, 255, 255, 0.5);
      transform: translateY(-50%) scale(1.1);
    }

    .prev-btn {
      left: 20px;
    }

    .next-btn {
      right: 20px;
    }

    .carousel-dots {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .dot.active {
      background: white;
      transform: scale(1.3);
    }

    .dot:hover {
      background: rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body>
  <div class="carousel">
    <div class="carousel-track">
      <!-- 最后一个幻灯片的克隆 (用于无缝过渡到第一张) -->
      <div class="carousel-slide">
        <div class="slide-content">
          <h2>🎉 第五张</h2>
          <p>无缝循环超丝滑</p>
        </div>
      </div>
      <!-- 真正的第一张到第五张 -->
      <div class="carousel-slide">
        <div class="slide-content">
          <h2>🌈 第一张</h2>
          <p>欢迎来到轮播图世界</p>
        </div>
      </div>
      <div class="carousel-slide">
        <div class="slide-content">
          <h2>🌊 第二张</h2>
          <p>流畅的切换动画</p>
        </div>
      </div>
      <div class="carousel-slide">
        <div class="slide-content">
          <h2>🌟 第三张</h2>
          <p>支持键盘左右键</p>
        </div>
      </div>
      <div class="carousel-slide">
        <div class="slide-content">
          <h2>🍭 第四张</h2>
          <p>底部圆点导航</p>
        </div>
      </div>
      <div class="carousel-slide">
        <div class="slide-content">
          <h2>🎉 第五张</h2>
          <p>无缝循环超丝滑</p>
        </div>
      </div>
      <!-- 第一个幻灯片的克隆 (用于无缝过渡到最后一张) -->
      <div class="carousel-slide">
        <div class="slide-content">
          <h2>🌈 第一张</h2>
          <p>欢迎来到轮播图世界</p>
        </div>
      </div>
    </div>

    <button class="carousel-btn prev-btn">❮</button>
    <button class="carousel-btn next-btn">❯</button>

    <div class="carousel-dots">
      <span class="dot active" data-index="0"></span>
      <span class="dot" data-index="1"></span>
      <span class="dot" data-index="2"></span>
      <span class="dot" data-index="3"></span>
      <span class="dot" data-index="4"></span>
    </div>
  </div>

  <script>
    const track = document.querySelector('.carousel-track');
    const slides = document.querySelectorAll('.carousel-slide');
    const dots = document.querySelectorAll('.dot');
    const prevBtn = document.querySelector('.prev-btn');
    const nextBtn = document.querySelector('.next-btn');

    // 真实的幻灯片数量是5张
    const totalSlides = 5;
    // track 中有7个元素：克隆1 + 真实5 + 克隆2
    // 初始位置在第1个真实幻灯片（索引1）
    let currentIndex = 1;
    let isTransitioning = false;

    // 初始化位置
    track.style.transform = `translateX(-${currentIndex * 100}%)`;

    function updateCarousel(index, withTransition = true) {
      if (!withTransition) {
        track.style.transition = 'none';
      } else {
        track.style.transition = 'transform 0.5s ease-in-out';
      }

      track.style.transform = `translateX(-${index * 100}%)`;

      // 更新圆点 (映射到真实幻灯片索引 0-4)
      const realIndex = (index - 1 + totalSlides) % totalSlides;
      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === realIndex);
      });
    }

    function nextSlide() {
      if (isTransitioning) return;
      isTransitioning = true;

      currentIndex++;
      updateCarousel(currentIndex);

      track.addEventListener('transitionend', function handler() {
        // 如果已经到了最后一个克隆幻灯片（索引6），瞬间切换到第一个真实幻灯片（索引1）
        if (currentIndex >= slides.length - 1) {
          currentIndex = 1;
          updateCarousel(currentIndex, false);
        }
        isTransitioning = false;
        track.removeEventListener('transitionend', handler);
      });
    }

    function prevSlide() {
      if (isTransitioning) return;
      isTransitioning = true;

      currentIndex--;
      updateCarousel(currentIndex);

      track.addEventListener('transitionend', function handler() {
        // 如果已经到了第一个克隆幻灯片（索引0），瞬间切换到最后一个真实幻灯片（索引5）
        if (currentIndex <= 0) {
          currentIndex = slides.length - 2;
          updateCarousel(currentIndex, false);
        }
        isTransitioning = false;
        track.removeEventListener('transitionend', handler);
      });
    }

    nextBtn.addEventListener('click', nextSlide);
    prevBtn.addEventListener('click', prevSlide);

    dots.forEach((dot, index) => {
      dot.addEventListener('click', () => {
        if (isTransitioning) return;
        // 点击圆点跳转到对应的真实幻灯片（索引 + 1）
        currentIndex = index + 1;
        updateCarousel(currentIndex);
      });
    });

    // 键盘控制
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') prevSlide();
      if (e.key === 'ArrowRight') nextSlide();
    });

    // 自动播放
    let autoplayInterval = setInterval(nextSlide, 3000);

    // 鼠标悬停暂停
    const carousel = document.querySelector('.carousel');
    carousel.addEventListener('mouseenter', () => clearInterval(autoplayInterval));
    carousel.addEventListener('mouseleave', () => {
      autoplayInterval = setInterval(nextSlide, 3000);
    });
  </script>
</body>
</html>
