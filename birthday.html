<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>生日快乐</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    
    .balloons {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    
    .balloon {
      position: absolute;
      bottom: -100px;
      width: 50px;
      height: 70px;
      border-radius: 50%;
      animation: float-up 8s ease-in-out infinite;
      opacity: 0.8;
    }
    
    .balloon::after {
      content: '🎈';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
    }
    
    @keyframes float-up {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-110vh) rotate(10deg); opacity: 0; }
    }
    
    .cake-container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .cake {
      position: relative;
      width: 200px;
      height: 200px;
      margin-bottom: 30px;
    }
    
    .cake-bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 80px;
      background: linear-gradient(180deg, #ff6b6b 0%, #ee5a5a 100%);
      border-radius: 10px 10px 30px 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    
    .cake-bottom::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      height: 15px;
      background: repeating-linear-gradient(90deg, #ffd700 0px, #ffd700 15px, #ff6b6b 15px, #ff6b6b 30px);
      border-radius: 5px;
    }
    
    .cake-middle {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 60px;
      background: linear-gradient(180deg, #ff8e8e 0%, #ff6b6b 100%);
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.15);
    }
    
    .cake-middle::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      height: 12px;
      background: #fff;
      border-radius: 5px;
      opacity: 0.6;
    }
    
    .cake-top {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 50px;
      background: linear-gradient(180deg, #ffa8a8 0%, #ff6b6b 100%);
      border-radius: 50% 50% 10px 10px;
    }
    
    .cake-top::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      height: 10px;
      background: #fff;
      border-radius: 5px;
      opacity: 0.5;
    }
    
    .candle {
      position: absolute;
      bottom: 150px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 40px;
      background: linear-gradient(90deg, #fff 0%, #eee 50%, #ddd 100%);
      border-radius: 3px;
    }
    
    .candle::before {
      content: '';
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 25px;
      background: linear-gradient(180deg, #ff6b6b, #ffa500, #ffcc00);
      border-radius: 50% 50% 20% 20%;
      animation: flicker 0.3s ease-in-out infinite alternate;
      box-shadow: 0 0 20px #ffa500, 0 0 40px #ff6b6b, 0 0 60px #ffcc00;
    }
    
    @keyframes flicker {
      0% { transform: translateX(-50%) scale(1) rotate(-3deg); opacity: 1; }
      100% { transform: translateX(-50%) scale(1.15) rotate(3deg); opacity: 0.85; }
    }
    
    .birthday-text {
      text-align: center;
      z-index: 10;
    }
    
    .birthday-text h1 {
      font-size: 2.8rem;
      color: #fff;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.3), 0 0 30px rgba(255,107,107,0.5);
      margin-bottom: 15px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .birthday-text p {
      font-size: 1.3rem;
      color: #fff;
      opacity: 0.95;
    }
    
    .wishes {
      margin-top: 40px;
      padding: 25px;
      background: rgba(255,255,255,0.25);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      max-width: 320px;
      border: 2px solid rgba(255,255,255,0.3);
    }
    
    .wishes p {
      color: #fff;
      font-size: 1.1rem;
      line-height: 2;
      text-align: center;
      font-weight: 500;
    }
    
    .music-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 65px;
      height: 65px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6b6b, #ffa500);
      border: none;
      cursor: pointer;
      box-shadow: 0 5px 25px rgba(255,107,107,0.6);
      z-index: 100;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
    }
    
    .music-btn:hover { transform: scale(1.1); }
    .music-btn.playing { animation: spin 2s linear infinite; }
    
    .start-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      cursor: pointer;
    }
    
    .start-overlay.hidden { display: none; }
    
    .start-overlay h2 {
      color: #fff;
      font-size: 2rem;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255,107,107,0.8);
    }
    
    .start-overlay .tap-hint {
      color: #fff;
      font-size: 1.3rem;
      animation: bounce 1s ease-in-out infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
    
    .confetti-piece {
      position: absolute;
      width: 12px;
      height: 12px;
      top: -20px;
      animation: confetti-fall 4s linear infinite;
    }
    
    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0.5; }
    }
    
    @media (max-width: 480px) {
      .cake { transform: scale(0.75); margin-bottom: 15px; }
      .birthday-text h1 { font-size: 2.2rem; }
      .birthday-text p { font-size: 1.1rem; }
      .wishes { margin-top: 30px; padding: 20px; }
      .wishes p { font-size: 1rem; }
      .music-btn { width: 55px; height: 55px; font-size: 24px; bottom: 20px; right: 20px; }
    }
    
    @media (max-width: 360px) {
      .cake { transform: scale(0.6); }
      .birthday-text h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div class="start-overlay" id="startOverlay">
    <h2>🎂 生日快乐 🎂</h2>
    <p class="tap-hint">👆 点击屏幕开始 🎵</p>
  </div>
  <div class="balloons" id="balloons"></div>
  <div class="confetti" id="confetti"></div>
  
  <div class="cake-container">
    <div class="cake">
      <div class="candle"></div>
      <div class="cake-top"></div>
      <div class="cake-middle"></div>
      <div class="cake-bottom"></div>
    </div>
    
    <div class="birthday-text">
      <h1>🎂 生日快乐 🎂</h1>
      <p>愿每一天都充满阳光和欢笑</p>
    </div>
    
    <div class="wishes">
      <p>🎵 祝你生日快乐 🎵<br>🎉 愿你心想事成 🎉<br>⭐ 永远幸福健康 ⭐</p>
    </div>
  </div>
  
  <button class="music-btn" id="musicBtn">🎵</button>

  <script>
    // 生成气球
    const balloonsContainer = document.getElementById('balloons');
    const colors = ['#ff6b6b', '#ffa500', '#48dbfb', '#1dd1a1', '#a55eea', '#fd79a8', '#ffd700'];
    
    for (let i = 0; i < 15; i++) {
      const balloon = document.createElement('div');
      balloon.className = 'balloon';
      balloon.style.left = Math.random() * 100 + '%';
      balloon.style.animationDelay = Math.random() * 8 + 's';
      balloon.style.animationDuration = (6 + Math.random() * 4) + 's';
      const color = colors[Math.floor(Math.random() * colors.length)];
      balloon.style.background = `radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.9), ${color}dd)`;
      balloon.style.boxShadow = `inset -5px -5px 15px ${color}88`;
      balloonsContainer.appendChild(balloon);
    }
    
    // 生成彩带
    const confettiContainer = document.getElementById('confetti');
    const confettiColors = ['#ff6b6b', '#ffa500', '#48dbfb', '#1dd1a1', '#ffd700', '#a55eea', '#fd79a8'];
    
    for (let i = 0; i < 50; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + '%';
      piece.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      piece.style.animationDelay = Math.random() * 4 + 's';
      piece.style.animationDuration = (3 + Math.random() * 2) + 's';
      if (Math.random() > 0.5) {
        piece.style.borderRadius = '50%';
      }
      confettiContainer.appendChild(piece);
    }
    
    // 音乐控制 - 使用 Web Audio API
    const musicBtn = document.getElementById('musicBtn');
    const startOverlay = document.getElementById('startOverlay');
    let isPlaying = false;
    let audioCtx = null;
    let melodyInterval = null;
    
    // 生日快乐歌旋律 (音符频率 Hz)
    const melody = [
      { freq: 523.25, duration: 0.5 }, { freq: 523.25, duration: 0.5 },
      { freq: 587.33, duration: 1.0 }, { freq: 523.25, duration: 1.0 },
      { freq: 659.25, duration: 1.0 }, { freq: 587.33, duration: 2.0 },
      { freq: 523.25, duration: 0.5 }, { freq: 523.25, duration: 0.5 },
      { freq: 587.33, duration: 1.0 }, { freq: 523.25, duration: 1.0 },
      { freq: 783.99, duration: 1.0 }, { freq: 659.25, duration: 2.0 },
      { freq: 523.25, duration: 0.5 }, { freq: 523.25, duration: 0.5 },
      { freq: 1046.50, duration: 1.0 }, { freq: 783.99, duration: 1.0 },
      { freq: 659.25, duration: 1.0 }, { freq: 587.33, duration: 1.0 },
      { freq: 523.25, duration: 0.5 }, { freq: 523.25, duration: 0.5 },
      { freq: 659.25, duration: 1.0 }, { freq: 659.25, duration: 1.0 },
      { freq: 587.33, duration: 1.0 }, { freq: 523.25, duration: 2.0 },
    ];
    
    let noteIndex = 0;
    let nextNoteTime = 0;
    let schedulerTimer = null;
    
    function scheduleNote() {
      if (!isPlaying || !audioCtx) return;
      
      const note = melody[noteIndex];
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.frequency.value = note.freq;
      osc.type = 'sine';
      
      const now = audioCtx.currentTime;
      gain.gain.setValueAtTime(0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + note.duration * 0.95);
      
      osc.start(now);
      osc.stop(now + note.duration);
      
      noteIndex = (noteIndex + 1) % melody.length;
      
      // 根据下一个音符的 duration 来调度
      const nextDuration = melody[noteIndex].duration * 1000;
      schedulerTimer = setTimeout(scheduleNote, nextDuration);
    }
    
    function startMusic() {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        
        isPlaying = true;
        musicBtn.classList.add('playing');
        
        // 开始播放旋律
        scheduleNote();
        
      } catch(e) {
        console.error('音乐播放失败:', e);
      }
    }
    
    function stopMusic() {
      isPlaying = false;
      musicBtn.classList.remove('playing');
      if (schedulerTimer) {
        clearTimeout(schedulerTimer);
        schedulerTimer = null;
      }
    }
    
    function toggleMusic() {
      if (isPlaying) {
        stopMusic();
      } else {
        startMusic();
      }
    }
    
    musicBtn.addEventListener('click', toggleMusic);
    
    // 用户点击后开始播放音乐并隐藏遮罩
    startOverlay.addEventListener('click', () => {
      startOverlay.classList.add('hidden');
      startMusic();
    });
  </script>
</body>
</html>
